        }

        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 0;
            min-height: 800px;
        }

        .sidebar {

            border-right: 2px solid #dee2e6;
            padding: 20px;
            overflow-y: auto;

        }

            margin-bottom: 15px;

        .module-list {

        .module-item {
            margin-bottom: 10px;
        }

        .module-button {
            width: 100%;
            padding: 12px 16px;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .module-button:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateX(5px);
        }

        .module-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .module-icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .detail-panel {
            padding: 30px;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }

        .detail-panel h2 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #2d3436;
        }

        .detail-panel .subtitle {
            color: #6c757d;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h3 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #2d3436;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;

            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .param-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;

        }

        .param-card .label {
            font-size: 0.85em;
            color: #6c757d;
            margin-bottom: 5px;
        }

        .param-card .value {
            font-size: 1.1em;
            font-weight: 600;
            color: #2d3436;
        }

        .layer-structure {
            margin-top: 20px;
        }

        .layer {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .layer:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
        }

        .layer-header {
            padding: 15px 20px;
            background: #f8f9fa;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .layer-header:hover {
            background: #e9ecef;
        }

        .layer-title {
            font-weight: 600;
            font-size: 1.05em;
            color: #2d3436;
        }

        .layer-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .layer-content {
            padding: 20px;
            display: none;
            background: #fafbfc;
        }

        .layer-content.expanded {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .layer-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .layer-detail-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .layer-detail-item .key {
            font-size: 0.9em;
            color: #6c757d;
            font-weight: 500;
        }

        .layer-detail-item .val {
            font-size: 1em;
            color: #2d3436;
            font-weight: 600;
        }

        .code-block {
            background: #2d3436;
            color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            overflow-x: auto;
            margin-top: 15px;

        .code-block .comment {
            color: #95a5a6;
        }

        .code-block .keyword {
            color: #3498db;
        }

        .code-block .param {
            color: #e74c3c;
        }

        .expand-all {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .expand-all:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .flow-step {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .flow-step-number {
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .flow-step-content {
            flex: 1;
        }

        .flow-step-title {
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 5px;
        }

        .flow-step-desc {
            color: #6c757d;
            font-size: 0.95em;
        }

        .stats-bar {
            background: #f8f9fa;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            border-top: 2px solid #e9ecef;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #6c757d;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
        }

        .note-title {
            font-weight: 600;
            color: #856404;
            margin-bottom: 8px;
        }

        .note-content {
            color: #856404;
            font-size: 0.95em;
            line-height: 1.6;
        }
    </style>
</head>

    <script>
        const moduleData = {

                title: 'DINO 检测器',
                subtitle: 'DETR with Improved deNoising anchOr boxes',

                params: [
                    { label: 'Backbone', value: 'ResNet-50' },

                    { title: 'Encoder编码', desc: '6层Deformable Transformer，跨尺度特征融合' },
                    { title: 'Decoder解码', desc: '6层解码器，900个queries预测目标' },
                    { title: '输出检测', desc: '分类logits + 边界框坐标 (cx, cy, w, h)' },
                ],
                layers: [
                    {

                        details: {
                            '架构': 'ResNet-50 (COCO预训练)',
                            '输出层': 'conv3, conv4, conv5',
                            '输出通道': '[512, 1024, 2048]',
                            '下采样率': '[8x, 16x, 32x]',
                        },
                        code: `# ResNet-50 特征提取
backbone = ResNet50(pretrained=True)
features = {
    'conv3': (B*T, 512, H/8, W/8),    # 低层特征
    'conv4': (B*T, 1024, H/16, W/16), # 中层特征
    'conv5': (B*T, 2048, H/32, W/32)  # 高层特征
}`
                    },
                    {
                        name: '多尺度特征投影',
                        type: '特征处理',
                        details: {
                            '输入尺度': '5个 (3个backbone + 2个下采样)',

                        code: `# 多尺度特征投影
input_proj = nn.ModuleList([
    nn.Conv2d(512, 256, kernel_size=1),   # conv3
    nn.Conv2d(1024, 256, kernel_size=1),  # conv4
    nn.Conv2d(2048, 256, kernel_size=1),  # conv5
    nn.Conv2d(2048, 256, kernel_size=3, stride=2, padding=1),  # P6

                    {
                        name: 'Deformable Transformer Encoder',
                        type: 'Encoder',
                        details: {
                            '层数': '6层',
                            '注意力头数': '8头',

                            'FFN维度': '2048 (8×hidden_dim)',

class DeformableEncoderLayer:
    # Multi-scale Deformable Attention
    self_attn = MSDeformAttn(
        d_model=256, n_levels=5, n_heads=8, n_points=4
    )
    # Feed-forward Network
    ffn = FFN(d_model=256, d_ffn=2048)

# 输出: (B*T, sum(H*W), 256)`
                    },
                    {
                        name: 'Deformable Transformer Decoder',
                        type: 'Decoder',
                        details: {
                            '层数': '6层',
                            '注意力头数': '8头',
                            'Queries数量': '900个',
                            'Self-Attention': '标准多头注意力',
                            'Cross-Attention': 'Deformable注意力',
                        },
                        code: `# Decoder Layer
class DeformableDecoderLayer:
    # Self-attention (query间交互)
    self_attn = MultiheadAttention(
        embed_dim=256, num_heads=8
    )
    # Cross-attention (query <-> encoder特征)
    cross_attn = MSDeformAttn(
        d_model=256, n_levels=5, n_heads=8, n_points=4
    )
    # Feed-forward
    ffn = FFN(d_model=256, d_ffn=2048)`
                    },
                    {
                        name: '预测头 (Prediction Heads)',
                        type: '输出层',

class_embed = nn.Linear(256, num_classes)  # 1类
bbox_embed = MLP(256, 256, 4, 3)  # 3层MLP

# 输出
outputs = {
    'pred_logits': (B*T, 900, 1),  # 分类
    'pred_boxes': (B*T, 900, 4),   # 边界框

}`

                note: {
                    title: '关键特性',
                    content: '1. COCO预训练提供强大的检测基础能力\n2. Deformable Attention降低计算复杂度\n3. Two-stage设计提升小目标检测性能\n4. 输出的256维特征用于后续的轨迹建模'
                }
            },
            'freq-decomp': {
                title: '频率分解模块',
                subtitle: 'Learnable Frequency Decomposition',
                description: '将轨迹特征分解为多个频率带，捕捉不同时间尺度的运动模式',

            allContents.forEach(content => {
                if (anyExpanded) {
                    content.classList.remove('expanded');
                } else {
                    content.classList.add('expanded');
                }
            });
        };

        moduleButtons.forEach(button => {
            button.addEventListener('click', () => {
                moduleButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');

                const moduleName = button.dataset.module;
                renderModuleDetail(moduleName);
            });
        });

        // Load first module by default
        renderModuleDetail('dino');
    </script>
</body>
</html>
