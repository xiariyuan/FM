# ============================================================================
# FA-MOT V2 Anti-Overfitting Configuration
#
# 针对过拟合问题的优化配置：
# 1. 更强的数据增强
# 2. 更多正则化
# 3. 更少的训练轮数
# 4. 验证集监控
# ============================================================================

SUPER_CONFIG_PATH:

# Seed:
SEED: 42

# System Settings:
NUM_WORKERS: 4
PREFETCH_FACTOR: 4
DEVICE: cuda

# Data settings:
DATA_ROOT: /gemini/code/datasets
DATASETS: [MOT17]
DATASET_SPLITS: [train]

# ============================================================================
# Train/Val Split - 重要！用于早停
# ============================================================================
# 使用 MOT17-02, MOT17-10 作为验证集（一个静态相机，一个移动相机）
VAL_SEQUENCES: [MOT17-02, MOT17-10]

SAMPLE_STEPS: [0]
SAMPLE_LENGTHS: [30]
SAMPLE_INTERVALS: [4]
LENGTH_PER_ITERATION:

# ============================================================================
# 数据增强 - 大幅增强以防止过拟合
# ============================================================================

# 尺度增强 - 更大范围
AUG_RESIZE_SCALES: [400, 448, 480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800, 832, 864]
AUG_MAX_SIZE: 1440
AUG_RANDOM_RESIZE: [320, 400, 480, 560, 640]
AUG_RANDOM_CROP_MIN: 320
AUG_RANDOM_CROP_MAX: 640
AUG_MAX_SHIFT_RATIO: 0.1       # 增加位移范围 (原0.06)
AUG_OVERFLOW_BBOX: False

# 颜色增强 - 更强
AUG_BRIGHTNESS: 0.5             # 增强 (原0.4)
AUG_CONTRAST: 0.5               # 增强 (原0.4)
AUG_SATURATION: 0.5             # 增强 (原0.4)
AUG_HUE: 0.3                    # 增强 (原0.2)
AUG_COLOR_JITTER_V2: True       # 启用V2颜色抖动
AUG_NUM_GROUPS: 8               # 增加分组数 (原6)

# 轨迹增强 - 适中（不要太强）
AUG_TRAJECTORY_OCCLUSION_PROB: 0.3    # 降低 (原0.5)
AUG_TRAJECTORY_SWITCH_PROB: 0.3       # 降低 (原0.5)

# ============================================================================
# BBox噪声增强 - 模拟公共检测器噪声
# ============================================================================
BBOX_POSITION_NOISE: 0.03      # 位置噪声 (原0.02)
BBOX_SIZE_NOISE: 0.04          # 尺寸噪声 (原0.03)
BBOX_DROP_PROB: 0.05           # 随机丢弃概率 (原0.02)
BBOX_AUG_PROB: 0.6             # 整体概率 (原0.5)

# ============================================================================
# Model settings
# ============================================================================

ONLY_DETR: False
NUM_CLASSES: 80
NUM_ID_VOCABULARY: 50
DETR_FRAMEWORK: dino

FEATURE_DIM: 256
FFN_DIM_RATIO: 2
ID_DIM: 256
HEAD_DIM: 32
NUM_ID_DECODER_LAYERS: 6

ID_LOSS_WEIGHT: 1.0
REL_PE_LENGTH: 30
USE_AUX_LOSS: True
USE_SHARED_AUX_HEAD: True
USE_FOCAL_LOSS: False

# ============================================================================
# 频率感知模块
# ============================================================================

USE_FREQ_AWARE: True
USE_FREQ_DECODER_V2: True
USE_LEARNABLE_FUSION: True

NUM_FREQ_BANDS: 4
FREQ_KERNEL_SIZE: 7
USE_FIXED_LAPLACIAN: False
USE_MULTISCALE_FREQ: False
NUM_FREQ_SCALES: 3

NUM_FREQ_TEMPORAL_LAYERS: 2
FREQ_TEMPORAL_HEADS: 8
USE_MAMBA_FOR_LOWFREQ: True
FREQ_DROPOUT: 0.2              # 增加dropout (原0.1)

USE_FREQ_GUIDED_ASSOC: True
USE_OCCLUSION_AWARE: True

FREQ_ORTHO_LOSS_WEIGHT: 0.1
FREQ_CONSISTENCY_LOSS_WEIGHT: 0.05

USE_FREQ_ADAPTER: False

# ============================================================================
# DINO检测器 - 增加正则化
# ============================================================================

BACKBONE: resnet50
DILATION: False
DETR_NUM_QUERIES: 900
DETR_NUM_FEATURE_LEVELS: 5
DETR_AUX_LOSS: True
DETR_WITH_BOX_REFINE: True
DETR_TWO_STAGE: True
DETR_HIDDEN_DIM: 256
DETR_MASKS: False
DETR_POSITION_EMBEDDING: sine
DETR_NUM_HEADS: 8
DETR_ENC_LAYERS: 6
DETR_DEC_LAYERS: 6
DETR_DIM_FEEDFORWARD: 2048
DETR_DROPOUT: 0.2              # 大幅增加dropout (原0.1)
DETR_DEC_N_POINTS: 4
DETR_ENC_N_POINTS: 4
DETR_CLS_LOSS_COEF: 2.0
DETR_BBOX_LOSS_COEF: 5.0
DETR_GIOU_LOSS_COEF: 2.0
DETR_FOCAL_ALPHA: 0.25
DETR_SET_COST_CLASS: 2.0
DETR_SET_COST_BBOX: 5.0
DETR_SET_COST_GIOU: 2.0
DETR_CRITERION_BATCH_LEN: 10

# DINO specific
DINO_CONFIG_PATH: ./config/DINO/DINO_5scale.py
DINO_TWO_STAGE_TYPE: standard
DINO_NUM_SELECT: 300
DINO_NMS_IOU_THRESHOLD: -1
DINO_DEC_PRED_CLASS_EMBED_SHARE: True
DINO_DEC_PRED_BBOX_EMBED_SHARE: True
DINO_TWO_STAGE_BBOX_EMBED_SHARE: False
DINO_TWO_STAGE_CLASS_EMBED_SHARE: False
DINO_DECODER_SA_TYPE: sa
DINO_NUM_PATTERNS: 0
DINO_USE_DN: False
DINO_DN_NUMBER: 100
DINO_LABEL_NOISE_RATIO: 0.5
DINO_BOX_NOISE_SCALE: 0.4
DINO_LABELBOOK_SIZE: 80

# ============================================================================
# 训练设置 - 防过拟合优化
# ============================================================================

BATCH_SIZE: 1
LR: 5.0e-5                     # 降低学习率 (原1e-4)
LR_BACKBONE_NAMES: [backbone.0]
LR_BACKBONE_SCALE: 0.05        # backbone学习率更低 (原0.1)
LR_LINEAR_PROJ_NAMES: [reference_points, sampling_offsets]
LR_LINEAR_PROJ_SCALE: 0.05
LR_DICTIONARY_NAMES: [word_to_embed, embed_to_word]
LR_DICTIONARY_SCALE: 1.0
LR_FREQ_NAMES: [freq_decomposition, freq_temporal_transformer, freq_association, freq_fusion, fusion_weight]
LR_FREQ_SCALE: 1.0

LR_WARMUP_EPOCHS: 2            # 增加warmup (原1)
WEIGHT_DECAY: 0.01             # 大幅增加权重衰减 (原0.001)
MAX_CLIP_NORM: 0.1
EPOCHS: 20                     # 减少训练轮数 (原40)
SCHEDULER_MILESTONES: [12, 16] # 调整学习率衰减点
SCHEDULER_GAMMA: 0.1
DETR_NUM_TRAIN_FRAMES: 4
DETR_NUM_CHECKPOINT_FRAMES: 0
USE_DECODER_CHECKPOINT: True   # 启用checkpoint节省内存
ACCUMULATE_STEPS: 2            # 增加梯度累积 (原1)
SEPARATE_CLIP_NORM: True
USE_ACCELERATE_CLIP_NORM: True

# ============================================================================
# Resume - 从DINO预训练开始，不要从之前过拟合的模型继续
# ============================================================================

DETR_PRETRAIN: ./weight/checkpoint0089.pth
RESUME_MODEL:                  # 空 = 从头开始训练ID模块
RESUME_OPTIMIZER: False
RESUME_SCHEDULER: False
RESUME_STATES: False

# ============================================================================
# Inference settings
# ============================================================================

INFERENCE_MODEL:
INFERENCE_DATASET: MOT17
INFERENCE_SPLIT: train
INFERENCE_MODE: evaluate
INFERENCE_GROUP: default
INFERENCE_MAX_LONGER: 1440
INFERENCE_DTYPE: FP32
ASSIGNMENT_PROTOCOL: object-max
MISS_TOLERANCE: 30
DET_THRESH: 0.3
NEWBORN_THRESH: 0.6
ID_THRESH: 0.2
AREA_THRESH: 0
MIN_TRACK_LEN: 0
IOU_THRESH: 0.1
INFERENCE_ONLY_DETR:

# ============================================================================
# Output settings
# ============================================================================

OUTPUTS_DIR: ./outputs/fa_mot_v2_anti_overfit
USE_WANDB: False
EXP_OWNER: research
EXP_PROJECT: FA-MOT
EXP_GROUP:
EXP_NAME: fa_mot_v2_anti_overfit
GIT_VERSION:
SAVE_CHECKPOINT_PER_EPOCH: 1
MULTI_LAST_CHECKPOINTS: 5      # 保留最后5个checkpoint便于选择
USE_PREVIOUS_CHECKPOINT: False
