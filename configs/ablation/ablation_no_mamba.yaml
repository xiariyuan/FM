# Ablation Study: Without Mamba for Low-Frequency
# Use Transformer for all frequency bands
SEED: 42
DEVICE: cuda
NUM_WORKERS: 4
EXP_NAME: ablation_no_mamba
DATA_ROOT: /gemini/code/datasets
DATASETS: [MOT17]
DATASET_SPLITS: [train]
VAL_SEQUENCES: [MOT17-04, MOT17-05]

# Ablation: Disable Mamba (use Transformer for all bands)
USE_MAMBA_FOR_LOWFREQ: False

EPOCHS: 30
BATCH_SIZE: 2
LR: 0.0002
EVAL_EVERY_EPOCH: True

FEATURE_DIM: 256
NUM_ID_VOCABULARY: 800
NUM_BANDS: 4
USE_FREQ_AWARE: True
USE_FREQ_DECODER_V2: True
FREQ_ORTHO_METRIC: js
