# Ablation Study: Number of Frequency Bands = 2
SEED: 42
DEVICE: cuda
NUM_WORKERS: 4
EXP_NAME: ablation_num_bands_K2
DATA_ROOT: /gemini/code/datasets
DATASETS: [MOT17]
DATASET_SPLITS: [train]
VAL_SEQUENCES: [MOT17-04, MOT17-05]

# Ablation variable
NUM_BANDS: 2

# Short training for ablation
EPOCHS: 30
BATCH_SIZE: 2
LR: 0.0002
EVAL_EVERY_EPOCH: True
SAVE_CHECKPOINT_PER_EPOCH: 10

# Same as main config
FEATURE_DIM: 256
NUM_ID_VOCABULARY: 800
USE_FREQ_AWARE: True
USE_FREQ_DECODER_V2: True
FREQ_ORTHO_METRIC: js
