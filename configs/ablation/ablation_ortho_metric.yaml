# Ablation Study: Frequency Orthogonality Metric
# Compare: js (Jensen-Shannon), dot (Dot Product), cosine
SEED: 42
DEVICE: cuda
NUM_WORKERS: 4
EXP_NAME: ablation_ortho_js
DATA_ROOT: /gemini/code/datasets
DATASETS: [MOT17]
DATASET_SPLITS: [train]
VAL_SEQUENCES: [MOT17-04, MOT17-05]

# Ablation variable
FREQ_ORTHO_METRIC: js  # Change to: js, dot, cosine

EPOCHS: 30
BATCH_SIZE: 2
LR: 0.0002
EVAL_EVERY_EPOCH: True

FEATURE_DIM: 256
NUM_ID_VOCABULARY: 800
NUM_BANDS: 4
USE_FREQ_AWARE: True
USE_FREQ_DECODER_V2: True
