SUPER_CONFIG_PATH: outputs/bytetrack_fa_mot_mot17_v10_tune_matchloss_val0405_allDet_fix27_longseq_len6/config_effective.yaml

# Local evaluation config: MOT17/train (TrackEval) with private detections (YOLOX)
# + external ReID embeddings (OSNet) for association.
#
# This variant keeps the ReID embedding dimension at 512 (OSNet native dim) to avoid
# lossy random projection to 256d.

EXP_NAME: eval_mot17_train_v10e1_privdet_reid512_feature_frcnn

INFERENCE_DATASET: MOT17
INFERENCE_SPLIT: train

RUN_TRACKEVAL: true
EVAL_ONLY_VAL: false

DETECTOR_FILTER: ["FRCNN"]
BYTETRACK_DET_SOURCE: model

# Detection / track management
DET_THRESH: 0.25
DET_MAX_PER_FRAME: 60
MISS_TOLERANCE: 15
NEWBORN_THRESH: 0.7

# Association (feature-only baseline)
ASSOC_MODE: feature
ASSOC_MATCHING: hungarian
ASSOC_IOU_GATE: 0.35
ID_THRESH: 0.05

# Use external ReID embeddings for feature association.
ASSOC_USE_REID: true
ASSOC_FEAT_SOURCE: reid
ASSOC_FEAT_SCORE_MODE: softmax
ASSOC_FEAT_TAU: 0.05

# ReID encoder (torchreid OSNet-AIN, local weights)
ASSOC_REID_BACKBONE: torchreid:osnet_ain_x1_0
ASSOC_REID_WEIGHTS: weight/osnet_ain_x1_0_msmt17_256x128_amsgrad_ep50_lr0.0015_coslr_b64_fb10_softmax_labsmth_flip_jitter.pth
ASSOC_REID_PRETRAINED: false
ASSOC_REID_INPUT_H: 256
ASSOC_REID_INPUT_W: 128
ASSOC_REID_BATCH_SIZE: 128
ASSOC_REID_L2_NORM: true
ASSOC_REID_DIM: 512

USE_TRACK_INTERPOLATION: false

