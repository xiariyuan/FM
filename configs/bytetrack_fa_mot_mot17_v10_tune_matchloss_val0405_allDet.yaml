SUPER_CONFIG_PATH: configs/bytetrack_fa_mot_mot17_v10_fromscratch_unfreezeproj_longcurr_p0fix_matchloss.yaml

# Tune config: hold out MOT17-04/05 for a *real* in-domain validation signal.
# - Train dataset excludes VAL_SEQUENCES
# - Val dataset includes only VAL_SEQUENCES
EXP_NAME: bytetrack_fa_mot_mot17_v10_tune_matchloss_val0405_allDet

# Use all public detection variants (DPM/FRCNN/SDP) to reduce overfitting and
# align with MOT17 public-detection evaluation requirements.
DETECTOR_FILTER: null

# Standard MOT17 train/val split used in many trackers.
VAL_SEQUENCES: [MOT17-04, MOT17-05]

# Use the best known association threshold from our sweep as the default for eval,
# so "best checkpoint" selection is not biased by suboptimal inference params.
ID_THRESH: 0.003

