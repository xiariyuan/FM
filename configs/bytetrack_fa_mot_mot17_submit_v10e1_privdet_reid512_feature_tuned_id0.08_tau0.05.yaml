SUPER_CONFIG_PATH: outputs/bytetrack_fa_mot_mot17_v10_tune_matchloss_val0405_allDet_fix27_longseq_len6/config_effective.yaml

# MOT17 submission config (ByteTrack runtime, private detections via YOLOX)
# Association uses external ReID embeddings (OSNet-AIN) in feature-only mode.
#
# Tuned on MOT17/train val sequences (04/05, FRCNN) via scripts/sweep_assoc_params.py:
#   ID_THRESH=0.08, ASSOC_FEAT_TAU=0.05, NEWBORN_THRESH=0.6, MISS_TOLERANCE=30
#
# This config is meant to be used with:
#   scripts/make_mot17_full_submission_bytetrack.py --det-source model --reuse-across-detectors
#
# Notes:
# - RUN_TRACKEVAL must be false for test split (no GT).
# - EVAL_ONLY_VAL must be false, otherwise it would only run MOT17-04/05.

EXP_NAME: submit_mot17_full_v10e1_privdet_reid512_feature_tuned_id0.08_tau0.05

INFERENCE_DATASET: MOT17
INFERENCE_SPLIT: test

RUN_TRACKEVAL: false
EVAL_ONLY_VAL: false

# Use private detections from the built-in YOLOX (ByteTrack) detector.
BYTETRACK_DET_SOURCE: model

# Detection / track management (tuned)
DET_THRESH: 0.25
DET_MAX_PER_FRAME: 60
MISS_TOLERANCE: 30
NEWBORN_THRESH: 0.6

# Association: ReID feature-only matching
ASSOC_MODE: feature
ASSOC_MATCHING: hungarian
ASSOC_IOU_GATE: 0.35
ID_THRESH: 0.08

# Use external ReID embeddings for association.
ASSOC_USE_REID: true
ASSOC_FEAT_SOURCE: reid
ASSOC_FEAT_SCORE_MODE: softmax
ASSOC_FEAT_TAU: 0.05

# ReID encoder (torchreid OSNet-AIN, local weights)
ASSOC_REID_BACKBONE: torchreid:osnet_ain_x1_0
ASSOC_REID_WEIGHTS: weight/osnet_ain_x1_0_msmt17_256x128_amsgrad_ep50_lr0.0015_coslr_b64_fb10_softmax_labsmth_flip_jitter.pth
ASSOC_REID_PRETRAINED: false
ASSOC_REID_INPUT_H: 256
ASSOC_REID_INPUT_W: 128
ASSOC_REID_BATCH_SIZE: 128
ASSOC_REID_L2_NORM: true
ASSOC_REID_DIM: 512

USE_TRACK_INTERPOLATION: false

