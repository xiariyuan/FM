SUPER_CONFIG_PATH: configs/bytetrack_fa_mot_mot17_v6_shortft.yaml

EXP_NAME: bytetrack_fa_mot_mot17_v6_submit_test

# Use all MOT17 test sequences (DPM/FRCNN/SDP), do not filter by detector token.
