SUPER_CONFIG_PATH: configs/experiments/bytetrack_fa_mot_mot20_v13_assoc_only_val05.yaml

# v14 MOT20 assoc-only adaptation with SFI-lite enabled.
# This is for a controlled comparison against v13 assoc-only.

EXP_NAME: bytetrack_fa_mot_mot20_v14_assoc_only_val05_sfi

# Keep current stable detector/training regime.
RESUME_SKIP_YOLOX: true
FREEZE_FEATURE_PROJ: true
USE_MEMORY_BANK: false

# Transformer-dominant mode.
USE_MAMBA_FOR_LOWFREQ: false
USE_GLOBAL_MAMBA: false

# New SFI block.
USE_SPATIAL_FREQ_INTERACTION: true
SFI_HIDDEN_RATIO: 2.0
SFI_ALPHA_INIT: 0.08

# Use the latest MOT20-only ReID best checkpoint.
ASSOC_REID_WEIGHTS: outputs/reid_mot20_only_osnetain_20260304_203842/reid_best.pth

# Start from best-known MOT20 proxy defaults (can still be swept).
DET_THRESH: 0.15
NEWBORN_THRESH: 0.25
ID_THRESH: 0.02
ASSOC_IOU_GATE: 0.25
MISS_TOLERANCE: 50
ASSOC_ID_WEIGHT: 0.25
ASSOC_FEAT_WEIGHT: 1.0
ASSOC_IOU_WEIGHT: 0.05
