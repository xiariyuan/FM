# Disable all frequency-aware modules and losses
USE_FREQ_AWARE: false
USE_FREQ_DECODER_V2: false
USE_FREQ_GUIDED_ASSOC: false
USE_SPATIAL_FREQ_INTERACTION: false

FREQ_LOSS_WEIGHT: 0.0
FREQ_ORTHO_LOSS_WEIGHT: 0.0
FREQ_CONSISTENCY_LOSS_WEIGHT: 0.0
