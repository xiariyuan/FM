SUPER_CONFIG_PATH: configs/bytetrack_fa_mot_mot17_v10_fromscratch_unfreezeproj_longcurr_p0fix_matchloss.yaml

# v10 tune config (fix26_longseq): stronger long-range curriculum from the beginning
# Motivation: association/AssA is the bottleneck; push longer temporal windows earlier to improve long-term matching.
EXP_NAME: bytetrack_fa_mot_mot17_v10_tune_matchloss_val0405_allDet_fix26_longseq

# Use all MOT17 detector variants during training (DPM/FRCNN/SDP).
DETECTOR_FILTER: null

# Hold out these sequences for validation (excluded from training by data/build_dataset()).
VAL_SEQUENCES: [MOT17-04, MOT17-05]

# Runtime inference threshold used in validation tracking.
ID_THRESH: 0.003

LOGGING_INTERVAL: 20

# === Longer temporal context ===
# MAX_SEQ_LEN controls FTT positional encoding length and inference track window default.
# It must be >= max(SAMPLE_LENGTHS).
MAX_SEQ_LEN: 48

# Curriculum sampling for stronger long-range association learning (earlier than v8/v9 default).
SAMPLE_STEPS: [0, 10, 25]
SAMPLE_LENGTHS: [18, 24, 30]
SAMPLE_INTERVALS: [4, 6, 8]

